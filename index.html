<!-- submit event program -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <h1>Profile Card Generator</h1>
        <form action="">
            <input id="img" type="text" placeholder="profile link" required>
            <input id="name" type="text" placeholder="enter your name" required>
            <input id="role" type="text" placeholder="occupation" required>
            <input id="info" type="text" placeholder="information about yourself" required>
            <input id="btn" type="submit" value="Create Card" type="submit">
        </form>     

        <div id="card-display"></div>
    </div>


    <script src="script.js"></script>
</body>
</html>
